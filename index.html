<!DOCTYPE html>
<html>

<head>
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Resume Builder</h1>

    <input id="name" placeholder="Full Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="phone" placeholder="Phone Number"><br>
    <input id="address" placeholder="Address"><br>

    <textarea id="education" placeholder="Education Details"></textarea><br>
    <textarea id="skills" placeholder="Skills"></textarea><br>
    <textarea id="projects" placeholder="Projects"></textarea><br>
    <textarea id="experience" placeholder="Experience"></textarea><br>

    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="downloadPDF()">Download PDF</button>

    <h2>Your Resume:</h2>
    <div id="output"></div>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

</body>

</html>
